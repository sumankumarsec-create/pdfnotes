<meta property="og:image:width" content="1200">

     crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{ --black:#0a0a0a; --white:#ffffff; --grey:#6b6b6b; --grey-light:#e8e8e8; --ease:cubic-bezier(.22,.61,.36,1); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--white); color:var(--black); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:820px; margin:0 auto; padding:0 32px; }
  header.site{ border-bottom:2px solid var(--black); padding:28px 0 20px; }
  .top-row{ display:flex; align-items:baseline; justify-content:space-between; gap:24px; flex-wrap:wrap; max-width:820px; margin:0 auto; padding:0 32px; }
  .logo{ font-family:'Fraunces', serif; font-weight:600; font-size:28px; letter-spacing:-0.01em; text-decoration:none; color:var(--black); }
  .logo span{ font-style:italic; font-weight:500; color:var(--grey); }
  .site-tag{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--grey); }
  main{ padding:64px 0 80px; }
  .kicker{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:clamp(34px, 5vw, 52px); line-height:1.05; letter-spacing:-0.02em; margin-bottom:12px; }
  h1 em{ font-style:italic; font-weight:500; }
  .subhead{ font-size:16px; line-height:1.6; color:var(--grey); max-width:640px; margin-bottom:28px; }

  /* main menu — 5 topics, same chip pattern as the archive's filters */
  .filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:44px; padding-bottom:28px; border-bottom:1px solid var(--grey-light); }
  .filter-chip{
    font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:.03em; text-transform:uppercase;
    padding:9px 14px; border:1.5px solid var(--black); background:var(--white); color:var(--black);
    cursor:pointer; transition:background .18s var(--ease), color .18s var(--ease); white-space:nowrap;
  }
  .filter-chip:hover{ background:var(--grey-light); }
  .filter-chip.active{ background:var(--black); color:var(--white); }

  article.post{ margin-bottom:56px; }
  .post-meta{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .post-tag{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--grey); border:1px solid var(--grey-light); padding:3px 8px;
  }
  .byline{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--grey); }
  h2.post-title{ font-family:'Fraunces', serif; font-weight:600; font-size:32px; line-height:1.1; letter-spacing:-0.015em; margin-bottom:22px; }
  h3{ font-family:'Fraunces', serif; font-weight:600; font-size:22px; margin:32px 0 12px; letter-spacing:-0.01em; }
  p{ font-size:16px; line-height:1.7; color:#2a2a2a; margin-bottom:18px; max-width:640px; }
  p.lead{ font-size:18px; line-height:1.65; color:var(--black); }
  a.inline{ color:var(--black); }
  .back{ display:inline-block; margin-top:8px; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--black); text-decoration:none; border-bottom:1px solid var(--black); }
  .empty-state{ display:none; font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--grey); padding:40px 0; }
  footer{ border-top:2px solid var(--black); padding:28px 0; }
  .footer-nav{ display:flex; flex-wrap:wrap; gap:20px; margin-bottom:18px; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; }
  .footer-nav a{ color:var(--black); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .15s var(--ease); }
  .footer-nav a:hover{ border-color:var(--black); }
  .foot-row{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--grey); }
  @media (max-width:640px){ .wrap, .top-row{ padding:0 18px; } }
</style>
</head>
<body>

<header class="site">
  <div class="top-row">
    <a class="logo" href="index.html">NOTES<span>.</span></a>
    <div class="site-tag">Study &amp; Reference Archive — Black / White Edition</div>
  </div>
</header>

<main class="wrap">
  <div class="kicker">Blog</div>
  <h1>Notes worth <em>keeping.</em></h1>
  <p class="subhead">Interview tips, study methods, and updates from the archive.</p>

  <nav class="filters" id="blogFilters">
    <button class="filter-chip active" data-cat="All">All</button>
    <button class="filter-chip" data-cat="Interview Tips">Interview Tips</button>
    <button class="filter-chip" data-cat="How to Study">How to Study</button>
    <button class="filter-chip" data-cat="Career Growth">Career Growth</button>
    <button class="filter-chip" data-cat="Tech & Tools">Tech &amp; Tools</button>
    <button class="filter-chip" data-cat="Site Updates">Site Updates</button>
  </nav>

  <div id="postList"></div>

  <div class="empty-state" id="blogEmptyState">No posts yet — check back soon.</div>

  <a class="back" href="index.html">← Back to the archive</a>
</main>

<footer>
  <div class="wrap">
    <nav class="footer-nav">
      <a href="about.html">About</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </nav>
    <div class="foot-row">
      <span>NOTES. — a static, offline-friendly archive</span>
      <span id="year"></span>
    </div>
  </div>
</footer>

<script>
document.getElementById('year').textContent = '© ' + new Date().getFullYear() + ' NOTES. All rights reserved.';

(function setupBlogFilters(){
  const chips = Array.from(document.querySelectorAll('#blogFilters .filter-chip'));
  const posts = Array.from(document.querySelectorAll('#postList .post'));
  const emptyState = document.getElementById('blogEmptyState');

  function applyFilter(cat){
    let visible = 0;
    posts.forEach(p => {
      const show = cat === 'All' || p.dataset.cat === cat;
      p.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    emptyState.style.display = visible === 0 ? 'block' : 'none';
  }

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      applyFilter(chip.dataset.cat);
    });
  });

  applyFilter('All');
})();

(function injectBlogStructuredData(){
  const data = {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "NOTES. Blog",
    "url": "https://pdfsent.com/blog.html"
  };
  const script = document.createElement('script');
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(data);
  document.head.appendChild(script);
})();
</script>
</body>
</html>
